name: Tests

# Runs the pytest suite on every push and pull request, on Linux, macOS,
# and Windows, so that regressions are caught automatically instead of
# relying only on manual testing.
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out the repository code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Tesseract and Poppler (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-grc poppler-utils

      - name: Install Tesseract and Poppler (macOS)
        if: runner.os == 'macOS'
        run: brew install tesseract tesseract-lang poppler

      - name: Install Tesseract and Poppler (Windows)
        if: runner.os == 'Windows'
        run: choco install tesseract poppler -y

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run the test suite
        run: pytest tests/ -v
