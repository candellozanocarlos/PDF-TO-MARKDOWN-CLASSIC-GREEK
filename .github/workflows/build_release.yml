name: Build and publish executables

# Triggers automatically every time you push a new version tag (e.g.
# v1.1). GitHub builds the Windows .exe and the macOS .app (both for
# Apple Silicon and for Intel Macs, they are NOT interchangeable) on
# real machines of each operating system/architecture (without you
# needing to own a Mac) and attaches them to the corresponding Release.
#
# How to publish a new version from now on:
#   git tag v1.1
#   git push origin v1.1
#
# It can also be triggered manually from the "Actions" tab of the GitHub
# repository, with the "Run workflow" button.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: >-
          Version tag to attach the files to (e.g. v1.1).
          Only used when the workflow is launched manually from this
          button; if launched by pushing a tag with
          "git push origin vX.Y", this is ignored and that tag is used
          instead.
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            label: windows
          # macos-latest currently means Apple Silicon (arm64). An arm64
          # .app cannot run at all on an Intel Mac (there is no Rosetta
          # translation in that direction), hence the separate Intel job
          # below: without it, every Intel Mac user gets "this app is
          # not compatible with this Mac" when trying to open it.
          - os: macos-latest
            label: macos-applesilicon
          - os: macos-15-intel
            label: macos-intel
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out the repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # --- Windows: builds a single .exe per application/language ---
      - name: Build "PDF a Markdown" (Windows, Spanish)
        if: matrix.label == 'windows'
        run: pyinstaller --onefile --windowed --name "PDF a Markdown" --add-data "tema_calido.json;." PDF_a_Markdown_GUI.py

      - name: Build "PDF a Markdown (con tablas)" (Windows, Spanish)
        if: matrix.label == 'windows'
        run: pyinstaller --onefile --windowed --name "PDF a Markdown (con tablas)" --add-data "tema_calido.json;." PDF_a_Markdown_con_Tablas_GUI.py

      - name: Build "PDF to Markdown" (Windows, English)
        if: matrix.label == 'windows'
        run: pyinstaller --onefile --windowed --name "PDF to Markdown" --add-data "tema_calido.json;." PDF_to_Markdown_GUI.py

      - name: Build "PDF to Markdown (with tables)" (Windows, English)
        if: matrix.label == 'windows'
        run: pyinstaller --onefile --windowed --name "PDF to Markdown (with tables)" --add-data "tema_calido.json;." PDF_to_Markdown_with_Tables_GUI.py

      # --- macOS: builds an .app bundle per application/language, zipped.
      # Runs on both the Apple Silicon and the Intel jobs; the resulting
      # .app only works on the architecture it was built on, hence the
      # architecture-specific zip name below (so both can be attached to
      # the same Release without overwriting each other). ---
      - name: Build "PDF a Markdown" (macOS, Spanish)
        if: matrix.label == 'macos-applesilicon' || matrix.label == 'macos-intel'
        run: pyinstaller --windowed --name "PDF a Markdown" --add-data "tema_calido.json:." PDF_a_Markdown_GUI.py

      - name: Build "PDF a Markdown (con tablas)" (macOS, Spanish)
        if: matrix.label == 'macos-applesilicon' || matrix.label == 'macos-intel'
        run: pyinstaller --windowed --name "PDF a Markdown (con tablas)" --add-data "tema_calido.json:." PDF_a_Markdown_con_Tablas_GUI.py

      - name: Build "PDF to Markdown" (macOS, English)
        if: matrix.label == 'macos-applesilicon' || matrix.label == 'macos-intel'
        run: pyinstaller --windowed --name "PDF to Markdown" --add-data "tema_calido.json:." PDF_to_Markdown_GUI.py

      - name: Build "PDF to Markdown (with tables)" (macOS, English)
        if: matrix.label == 'macos-applesilicon' || matrix.label == 'macos-intel'
        run: pyinstaller --windowed --name "PDF to Markdown (with tables)" --add-data "tema_calido.json:." PDF_to_Markdown_with_Tables_GUI.py

      - name: Zip the macOS apps (Apple Silicon)
        if: matrix.label == 'macos-applesilicon'
        run: |
          cd dist
          zip -r "PDF a Markdown (macOS Apple Silicon).zip" "PDF a Markdown.app"
          zip -r "PDF a Markdown (con tablas) (macOS Apple Silicon).zip" "PDF a Markdown (con tablas).app"
          zip -r "PDF to Markdown (macOS Apple Silicon).zip" "PDF to Markdown.app"
          zip -r "PDF to Markdown (with tables) (macOS Apple Silicon).zip" "PDF to Markdown (with tables).app"
          rm -rf "PDF a Markdown.app" "PDF a Markdown (con tablas).app" "PDF to Markdown.app" "PDF to Markdown (with tables).app"

      - name: Zip the macOS apps (Intel)
        if: matrix.label == 'macos-intel'
        run: |
          cd dist
          zip -r "PDF a Markdown (macOS Intel).zip" "PDF a Markdown.app"
          zip -r "PDF a Markdown (con tablas) (macOS Intel).zip" "PDF a Markdown (con tablas).app"
          zip -r "PDF to Markdown (macOS Intel).zip" "PDF to Markdown.app"
          zip -r "PDF to Markdown (with tables) (macOS Intel).zip" "PDF to Markdown (with tables).app"
          rm -rf "PDF a Markdown.app" "PDF a Markdown (con tablas).app" "PDF to Markdown.app" "PDF to Markdown (with tables).app"

      - name: Save the built files
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.label }}
          path: |
            dist/*.exe
            dist/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download the files from all systems/architectures
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Attach the files to the Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: artifacts/**/*
