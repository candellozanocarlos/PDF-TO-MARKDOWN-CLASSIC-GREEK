name: Construir y publicar ejecutables

# Se dispara automáticamente cada vez que subes una etiqueta de versión
# nueva (por ejemplo v1.1). GitHub construye el .exe de Windows y el .app
# de macOS en máquinas reales de cada sistema operativo (sin que tú
# necesites tener un Mac) y los adjunta al Release correspondiente.
#
# Cómo publicar una nueva versión a partir de ahora:
#   git tag v1.1
#   git push origin v1.1
#
# También se puede lanzar manualmente desde la pestaña "Actions" del
# repositorio en GitHub, con el botón "Run workflow".
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  construir:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # --- Windows: genera un único .exe por aplicación ---
      - name: Construir "PDF a Markdown" (Windows)
        if: runner.os == 'Windows'
        run: pyinstaller --onefile --windowed --name "PDF a Markdown" --add-data "tema_calido.json;." PDF_a_Markdown_GUI.py

      - name: Construir "PDF a Markdown (con tablas)" (Windows)
        if: runner.os == 'Windows'
        run: pyinstaller --onefile --windowed --name "PDF a Markdown (con tablas)" --add-data "tema_calido.json;." PDF_a_Markdown_con_Tablas_GUI.py

      # --- macOS: genera un paquete .app por aplicación, comprimido en .zip ---
      - name: Construir "PDF a Markdown" (macOS)
        if: runner.os == 'macOS'
        run: pyinstaller --windowed --name "PDF a Markdown" --add-data "tema_calido.json:." PDF_a_Markdown_GUI.py

      - name: Construir "PDF a Markdown (con tablas)" (macOS)
        if: runner.os == 'macOS'
        run: pyinstaller --windowed --name "PDF a Markdown (con tablas)" --add-data "tema_calido.json:." PDF_a_Markdown_con_Tablas_GUI.py

      - name: Comprimir las apps de macOS
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r "PDF a Markdown (macOS).zip" "PDF a Markdown.app"
          zip -r "PDF a Markdown (con tablas) (macOS).zip" "PDF a Markdown (con tablas).app"
          rm -rf "PDF a Markdown.app" "PDF a Markdown (con tablas).app"

      - name: Guardar los archivos generados
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.zip

  publicar:
    needs: construir
    runs-on: ubuntu-latest
    steps:
      - name: Descargar los archivos de ambos sistemas
        uses: actions/download-artifact@v4
        with:
          path: artefactos

      - name: Adjuntar los archivos al Release
        uses: softprops/action-gh-release@v2
        with:
          files: artefactos/**/*
