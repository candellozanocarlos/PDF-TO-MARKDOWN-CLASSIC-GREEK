name: Build and publish executables

# Triggers automatically every time you push a new version tag (e.g.
# v1.1). GitHub builds the Windows .exe and the macOS .app on real
# machines of each operating system (without you needing to own a Mac)
# and attaches them to the corresponding Release.
#
# How to publish a new version from now on:
#   git tag v1.1
#   git push origin v1.1
#
# It can also be triggered manually from the "Actions" tab of the GitHub
# repository, with the "Run workflow" button.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: >-
          Version tag to attach the files to (e.g. v1.1).
          Only used when the workflow is launched manually from this
          button; if launched by pushing a tag with
          "git push origin vX.Y", this is ignored and that tag is used
          instead.
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out the repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # --- Windows: builds a single .exe per application ---
      - name: Build "PDF a Markdown" (Windows)
        if: runner.os == 'Windows'
        run: pyinstaller --onefile --windowed --name "PDF a Markdown" --add-data "tema_calido.json;." PDF_a_Markdown_GUI.py

      - name: Build "PDF a Markdown (con tablas)" (Windows)
        if: runner.os == 'Windows'
        run: pyinstaller --onefile --windowed --name "PDF a Markdown (con tablas)" --add-data "tema_calido.json;." PDF_a_Markdown_con_Tablas_GUI.py

      # --- macOS: builds an .app bundle per application, zipped ---
      - name: Build "PDF a Markdown" (macOS)
        if: runner.os == 'macOS'
        run: pyinstaller --windowed --name "PDF a Markdown" --add-data "tema_calido.json:." PDF_a_Markdown_GUI.py

      - name: Build "PDF a Markdown (con tablas)" (macOS)
        if: runner.os == 'macOS'
        run: pyinstaller --windowed --name "PDF a Markdown (con tablas)" --add-data "tema_calido.json:." PDF_a_Markdown_con_Tablas_GUI.py

      - name: Zip the macOS apps
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r "PDF a Markdown (macOS).zip" "PDF a Markdown.app"
          zip -r "PDF a Markdown (con tablas) (macOS).zip" "PDF a Markdown (con tablas).app"
          rm -rf "PDF a Markdown.app" "PDF a Markdown (con tablas).app"

      - name: Save the built files
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download the files from both systems
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Attach the files to the Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: artifacts/**/*
